<main class="layout">
  <header>
    <h1>OpenAutoHAB AI</h1>
    <p>Safe AI-assisted openHAB bootstrap with mandatory approvals.</p>
  </header>

  <section class="card">
    <h2>Admin Login</h2>
    <div class="row">
      <input [(ngModel)]="username" placeholder="Username" />
      <input [(ngModel)]="password" type="password" placeholder="Password" />
      <button (click)="login()">Login</button>
    </div>
    <p>{{ message }}</p>
  </section>

  <section class="card">
    <h2>Discovery</h2>
    <div class="row">
      <input [(ngModel)]="cidr" placeholder="CIDR scope" />
      <button (click)="runDiscovery()">Run Safe Discovery</button>
      <button (click)="loadDevices()">Refresh Devices</button>
      <button (click)="loadAuditLogs()">Refresh Audit Logs</button>
    </div>
  </section>

  <section class="card">
    <h2>Discovered Devices</h2>
    <table>
      <thead><tr><th>UID</th><th>IP</th><th>Confidence</th></tr></thead>
      <tbody>
        <tr *ngFor="let device of devices">
          <td>{{ device.uid }}</td>
          <td>{{ device.ip }}</td>
          <td>{{ device.confidence }}</td>
        </tr>
      </tbody>
    </table>
  </section>

  <section class="card">
    <h2>Recent Audit Logs</h2>
    <ul>
      <li *ngFor="let log of auditLogs">{{ log.action }} → {{ log.target }}</li>
    </ul>
  </section>
</main>
