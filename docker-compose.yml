services:
  proxy:
    image: nginx:1.27-alpine
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - frontend
      - backend

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    environment:
      - OAH_DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/openautohab
      - OAH_REDIS_URL=redis://redis:6379/0
      - OAH_JWT_SECRET=${OAH_JWT_SECRET:-dev-jwt-secret}
      - OAH_INTERNAL_API_KEY=${OAH_INTERNAL_API_KEY:-dev-internal-key}
      - OAH_OPENHAB_BASE_URL=${OAH_OPENHAB_BASE_URL:-http://openhab:8080}
      - OAH_OPENHAB_TOKEN=${OAH_OPENHAB_TOKEN:-}
      - OAH_HOMEMATIC_URL=${OAH_HOMEMATIC_URL:-http://homematic-mock:9123}
      - OAH_HF_MODE=${OAH_HF_MODE:-disabled}
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ./backend
    command: ["python", "-m", "app.worker"]
    environment:
      - OAH_DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/openautohab
      - OAH_REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_DB=openautohab
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/migrations/sql/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql:ro

  redis:
    image: redis:7-alpine

  homematic-mock:
    image: mendhak/http-https-echo:31
    environment:
      - HTTP_PORT=9123

volumes:
  pg_data:
